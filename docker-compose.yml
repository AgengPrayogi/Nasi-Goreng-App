# Single-node MongoDB replica set for local development (multi-document transactions).
# Usage:
#   docker compose up -d
#   MONGODB_URI="mongodb://127.0.0.1:27017/nasi_goreng_polonia?replicaSet=rs0&directConnection=true"
#
# `mongo-init` runs `rs.initiate` once; wait until PRIMARY before hitting transactional APIs.

services:
  mongodb:
    image: mongo:7
    container_name: nasi-goreng-polonia-mongo
    ports:
      - "27017:27017"
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - ngp_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongo-init:
    image: mongo:7
    depends_on:
      mongodb:
        condition: service_healthy
    restart: on-failure
    entrypoint:
      [
        "mongosh",
        "mongodb://mongodb:27017",
        "--quiet",
        "--eval",
        "try { rs.status(); } catch (e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: '127.0.0.1:27017' }] }); }"
      ]

volumes:
  ngp_mongo_data:
